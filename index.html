<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>五重祝福打卡123</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      line-height: 1.5;
    }

    .card {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    #status {
      color: #666;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      background: #06c755;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    pre {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      background: #f6f6f6;
      overflow: auto;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">載入中...</h1>
    <div id="status">正在初始化 LINE 登入</div>

    <button id="submitButton" disabled>
      寫入 Google Sheet
    </button>

    <pre id="result"></pre>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const LIFF_ID = '2010462217-tVZRATTG';
    const API_URL = 'https://docs.google.com/spreadsheets/d/13EwZXlXtX9ZntHYHN1sLxNQbPJ3ZQCpCyrOROf3OKig/edit?gid=0#gid=0';

    let idToken = null;

    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const submitButton = document.getElementById('submitButton');

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        idToken = liff.getIDToken();

        if (!idToken) {
          throw new Error('拿不到 LINE ID token，請確認 LIFF scope 有選 openid');
        }

        titleEl.textContent = `Hello, ${profile.displayName}`;
        statusEl.textContent = 'LINE 登入成功，可以寫入 Google Sheet';
        submitButton.disabled = false;

      } catch (error) {
        titleEl.textContent = '發生錯誤';
        statusEl.textContent = String(error);
      }
    }

    submitButton.addEventListener('click', async () => {
      submitButton.disabled = true;
      statusEl.textContent = '寫入中...';
      resultEl.textContent = '';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            idToken: idToken,
            action: 'hello_button_clicked'
          })
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.error || '寫入失敗');
        }

        statusEl.textContent = '寫入成功';
        resultEl.textContent = JSON.stringify(data, null, 2);

      } catch (error) {
        statusEl.textContent = '寫入失敗';
        resultEl.textContent = String(error);

      } finally {
        submitButton.disabled = false;
      }
    });

    main();
  </script>
</body>
</html>
